name: Auto Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout code
      # ─────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v3

      # ─────────────────────────────────────────────
      # 2. Login Docker Hub
      # ─────────────────────────────────────────────
      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ─────────────────────────────────────────────
      # 3. Build & Push images
      # ─────────────────────────────────────────────
      - name: Build & Push Frontend
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=http://${{ secrets.HOST }}:8000 \
            -t ${{ secrets.DOCKER_USERNAME }}/tft-frontend:${{ github.sha }} ./Frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/tft-frontend:${{ github.sha }}

      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tft-backend:${{ github.sha }} ./Backend-new
          docker push ${{ secrets.DOCKER_USERNAME }}/tft-backend:${{ github.sha }}

      # ─────────────────────────────────────────────
      # 4. SSH vào VPS → deploy
      # ─────────────────────────────────────────────
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Đảm bảo repo tồn tại trên VPS
            if [ ! -d ~/tft-web ]; then
              git clone https://github.com/hieusoft/tft-web.git ~/tft-web
            fi

            cd ~/tft-web
            git pull origin main

            # Tạo/ghi đè .env từ GitHub Secrets (không cần setup thủ công trên VPS)
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"                                                                         > .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"                                                                 >> .env
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"                                                                            >> .env
            echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}"                                                                      >> .env
            echo "API_KEY=${{ secrets.API_KEY }}"                                                                                    >> .env
            echo "DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}" >> .env
            echo "REDIS_URL=redis://:${{ secrets.REDIS_PASSWORD }}@redis:6379/0"                                                     >> .env
            echo "BACKEND_IMAGE=${{ secrets.DOCKER_USERNAME }}/tft-backend:${{ github.sha }}"  >> .env
            echo "FRONTEND_IMAGE=${{ secrets.DOCKER_USERNAME }}/tft-frontend:${{ github.sha }}" >> .env
            echo "API_URL=http://tft_backend:8000"                                                                                   >> .env

            # Pull & restart với image đúng commit SHA
            docker compose up -d --no-build --pull always

            # Dọn image cũ không dùng nữa
            docker image prune -f
