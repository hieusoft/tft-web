name: Auto Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # login docker hub
      - name: Login Docker
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # build frontend
      - name: Build frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/tft-frontend ./Frontend   # ✅ Viết hoa

      # build backend
      - name: Build backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/tft-backend ./Backend-new  # ✅ Đúng tên thư mục

      # push image
      - name: Push Docker
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/tft-frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/tft-backend

      # SSH deploy
      - name: Deploy server
        uses: appleboy/ssh-action@v1.0.3   # ✅ Version mới hơn
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/tft-frontend
            docker pull ${{ secrets.DOCKER_USERNAME }}/tft-backend

            docker stop tft_frontend || true
            docker rm tft_frontend || true

            docker stop tft_backend || true
            docker rm tft_backend || true

            docker run -d -p 3000:3000 --name tft_frontend ${{ secrets.DOCKER_USERNAME }}/tft-frontend
            docker run -d -p 8000:8000 --name tft_backend ${{ secrets.DOCKER_USERNAME }}/tft-backend
