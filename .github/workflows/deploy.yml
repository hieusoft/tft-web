name: Auto Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # login docker hub
      - name: Login Docker
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # build frontend
      - name: Build frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/tft-frontend ./Frontend   # ✅ Viết hoa

      # build backend
      - name: Build backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/tft-backend ./Backend-new  # ✅ Đúng tên thư mục

      # push image
      - name: Push Docker
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/tft-frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/tft-backend

      # SSH deploy
      - name: Deploy server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Đảm bảo code mới nhất trên VPS
            cd ~/tft-web
            git pull origin main

            # Pull image mới nhất từ Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/tft-frontend
            docker pull ${{ secrets.DOCKER_USERNAME }}/tft-backend

            # Override image trong docker-compose bằng image đã build sẵn
            export FRONTEND_IMAGE=${{ secrets.DOCKER_USERNAME }}/tft-frontend
            export BACKEND_IMAGE=${{ secrets.DOCKER_USERNAME }}/tft-backend

            # Restart toàn bộ stack (postgres + redis + backend + frontend)
            docker compose down
            docker compose up -d

            # Dọn image cũ
            docker image prune -f
