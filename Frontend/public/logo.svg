<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 52" fill="none">
  <!-- Icon: khung bé lại (36x36), nội dung lục giác + diamond to hơn -->
  <rect x="6" y="8" width="36" height="36" rx="8" fill="#111111"/>
  <!-- Hexagon lớn hơn, gần sát khung -->
  <polygon
    points="24,12 35,18.5 35,31.5 24,38 13,31.5 13,18.5"
    fill="none"
    stroke="#f0b90b"
    stroke-width="2"
    stroke-linejoin="round"
  />
  <!-- Diamond lớn hơn -->
  <polygon
    points="24,19 30,25 24,31 18,25"
    fill="#f0b90b"
    opacity="0.9"
  />

  <!-- TFT (30px, xám) -->
  <text
    x="52"
    y="36"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-weight="800"
    font-size="30"
    fill="#bbbbbb"
    letter-spacing="1"
  >TFT</text>

  <!-- Meta (30px, vàng) -->
  <text
    x="108"
    y="36"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-weight="700"
    font-size="30"
    fill="#f0b90b"
    letter-spacing="-0.5"
  >Meta</text>
</svg>
