version: '3.9'

services:
  # ─────────────────────────────────────────────
  # Database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-mydb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-mydb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Cache
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Backend (FastAPI)
  # ─────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-tft-backend-local}
    build:
      context: ./Backend-new
      dockerfile: Dockerfile
    container_name: tft_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-mydb}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────────────
  # Frontend (Next.js)
  # ─────────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-tft-frontend-local}
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: tft_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_URL: https://api.tftmeta.gg
      NEXT_PUBLIC_API_URL: https://api.tftmeta.gg
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
